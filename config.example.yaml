# Example search/filter config — multi-source (Apify + local + free APIs)
# Copy to config.yaml via `jobs-applier init`
search:
  queries:
    - remote software engineer python
    - remote backend engineer laravel
  location: Remote
  country: worldwide
  platforms:
    - linkedin
    - indeed
  max_results: 15
  easy_apply_only: false
  is_remote: true
  hours_old: 48
  fetch_linkedin_descriptions: false
  # Tried in order when source_mode=fallback (first non-empty wins).
  # Use merge to combine all (slower / more results).
  sources:
    - apify
    - jobspy
    - remotive
    - remoteok
  source_mode: fallback

filters:
  include_title_keywords:
    - engineer
    - developer
  exclude_title_keywords:
    - intern
    - junior
    - "entry level"
  exclude_description_keywords:
    - must be US citizen
    - onsite only
    - relocation required
  exclude_companies: []
  remote_only: true
  max_days_old: 2
  require_posted_date: false
  min_salary: null
  min_relevance_score: 25
  preferred_keywords:
    - python
    - backend
    - api
  max_email_jobs: 12

platforms_enabled:
  linkedin: true
  indeed: true
  glassdoor: false
