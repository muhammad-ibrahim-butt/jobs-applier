# Example search/filter config — copy to config.yaml via `jobs-applier init`
search:
  queries:
    - remote software engineer
    - remote backend engineer
  location: Remote
  country: worldwide
  platforms:
    - linkedin
    - indeed
    - glassdoor
  max_results: 30
  easy_apply_only: false
  is_remote: true
  hours_old: 48

filters:
  include_title_keywords:
    - engineer
    - developer
  exclude_title_keywords:
    - intern
    - junior
    - "entry level"
  exclude_description_keywords:
    - must be US citizen
    - onsite only
    - relocation required
  exclude_companies: []
  remote_only: true
  max_days_old: 2
  # Keep false unless boards reliably return posted dates (JobSpy: date_posted).
  require_posted_date: false
  min_salary: null
  min_relevance_score: 25
  preferred_keywords:
    - python
    - backend
    - api
  max_email_jobs: 12

platforms_enabled:
  linkedin: true
  indeed: true
  glassdoor: true
