# Example search/filter config — tuned for Apify free-tier usage
# Copy to config.yaml via `jobs-applier init`
search:
  queries:
    - remote software engineer python
    - remote backend engineer laravel
  location: Remote
  country: worldwide
  platforms:
    - linkedin
    - indeed
  max_results: 15                 # keep low on free Apify (charged per job)
  easy_apply_only: false
  is_remote: true
  hours_old: 48
  # Costly: turns on extra LinkedIn page fetches. Title scoring works without it.
  fetch_linkedin_descriptions: false

filters:
  include_title_keywords:
    - engineer
    - developer
  exclude_title_keywords:
    - intern
    - junior
    - "entry level"
  exclude_description_keywords:
    - must be US citizen
    - onsite only
    - relocation required
  exclude_companies: []
  remote_only: true
  max_days_old: 2
  # Keep false unless boards reliably return posted dates (JobSpy: date_posted).
  require_posted_date: false
  min_salary: null
  min_relevance_score: 25
  preferred_keywords:
    - python
    - backend
    - api
  max_email_jobs: 12

platforms_enabled:
  linkedin: true
  indeed: true
  glassdoor: false              # Glassdoor often 403s and still burns compute
