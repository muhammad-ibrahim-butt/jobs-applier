# Search and scrape settings — worldwide remote
search:
  queries:
    - software engineer
    - backend developer
    - python developer
  location: Remote
  country: worldwide
  platforms:
    - linkedin
    - indeed
    - glassdoor
  max_results: 40
  easy_apply_only: false
  is_remote: true
  hours_old: 168

filters:
  include_title_keywords:
    - engineer
    - developer
  exclude_title_keywords:
    - intern
    - internship
    - unpaid
    - senior director
    - principal
    - staff
  exclude_description_keywords:
    - clearance required
    - must be US citizen
    - us citizenship required
    - security clearance
    - must be located in the united states
    - must reside in the us
    - no remote
    - onsite only
    - on-site only
  exclude_companies: []
  remote_only: true
  max_days_old: 7
  min_salary: null

platforms_enabled:
  linkedin: true
  indeed: true
  glassdoor: true
