name: Bug report
description: Report a bug in Jobs Applier
labels: ["bug"]
body:
  - type: textarea
    id: describe
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps (do not paste secrets, .env, or session cookies)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OS / Python version
      placeholder: Windows 11 / Python 3.11
  - type: checkboxes
    id: secrets
    attributes:
      label: Confirmation
      options:
        - label: I did not include API tokens, passwords, profile.yaml, or browser sessions
          required: true
